name: Feature request
description: Propose a focused improvement to Fields LM.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What research or engineering problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How should correctness, quality, speed, or memory be measured?
